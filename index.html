<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namti Drug House - Operational Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --health-teal: #0d9488; --dark-navy: #0f172a; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --border: #cbd5e1; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; color: var(--dark-navy); }

        /* Dashboard Styles */
        #employee-dashboard { padding: 2rem 4%; }
        .stats-card { background: #e0f2f1; padding: 1.5rem; border-radius: 16px; border-left: 5px solid var(--health-teal); margin-bottom: 2rem; }
        .card { background: white; padding: 2rem; border-radius: 16px; border: 1px solid var(--border); }
        .order-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .order-table th, .order-table td { padding: 1rem; border-bottom: 1px solid var(--border); text-align: left; }
        
        .badge { padding: 0.35rem 0.75rem; border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
        .badge-delivery { background: #dcfce7; color: #16a34a; } /* Green */
        .badge-pickup { background: #fee2e2; color: #dc2626; }   /* Red */
        
        .bill-input { width: 80px; padding: 0.4rem; border: 1px solid var(--border); border-radius: 6px; font-weight: bold; }
        .sms-trigger-btn { background: var(--health-teal); color: white; border: none; padding: 0.6rem 1rem; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="employee-dashboard">
        <div class="stats-card">
            <h2 id="total-revenue-display">Total Successful Orders: ₹ 0.00</h2>
        </div>

        <div class="card">
            <h2>Active Order Queue</h2>
            <table class="order-table">
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Pincode</th>
                        <th>Bill Total (₹)</th>
                        <th>Delivery Mode</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-orders-log"></tbody>
            </table>
        </div>
    </div>

    <script>
        const adminOrdersLog = document.getElementById('admin-orders-log');

        function updateDailyRevenue() {
            let total = 0;
            document.querySelectorAll('.bill-input').forEach(input => {
                const row = input.closest('tr');
                // Calculate only if approved
                if (row.querySelector('.status-field').textContent.includes("Confirmed")) {
                    total += parseFloat(input.value) || 0;
                }
            });
            document.getElementById('total-revenue-display').textContent = `Total Successful Orders: ₹ ${total.toFixed(2)}`;
        }

        function processOrder(tr, pincode, billInput) {
            const billValue = parseFloat(billInput.value) || 0;
            const statusBadge = tr.querySelector('.status-field');
            
            // Logic: 785684 Pincode AND >= 1999 Rs
            if (pincode === "785684" && billValue >= 1999) {
                statusBadge.className = "badge badge-delivery status-field";
                statusBadge.textContent = "Confirmed: Home Delivery";
            } else {
                statusBadge.className = "badge badge-pickup status-field";
                statusBadge.textContent = "Confirmed: Self Collection";
            }
            updateDailyRevenue();
        }

        function addRow(name, pincode, bill) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${name}</strong></td>
                <td>${pincode}</td>
                <td><input type="number" class="bill-input" value="${bill}" oninput="updateDailyRevenue()"></td>
                <td><span class="badge badge-warning status-field">Pending</span></td>
                <td><button class="sms-trigger-btn">Process Order</button></td>
            `;
            adminOrdersLog.appendChild(tr);

            tr.querySelector('.sms-trigger-btn').addEventListener('click', () => {
                processOrder(tr, pincode, tr.querySelector('.bill-input'));
            });
        }

        // Dummy Data Tests
        addRow("Rahul Borah", "785684", 2500); // Should be Home Delivery
        addRow("Pankaj Das", "785684", 500);   // Should be Self Collection (Low amount)
        addRow("Suman Gogoi", "785001", 3000); // Should be Self Collection (Wrong Pincode)
    </script>
</body>
</html>
