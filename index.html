<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namti Drug House - Secure Portal</title>
    <!-- CSS same rakha hai design consistency ke liye -->
    <style>
        :root { --primary: #0f172a; --accent: #0284c7; --success: #16a34a; --background: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); padding: 20px; }
        .nav-bar { background: var(--primary); color: white; padding: 15px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 20px; }
        .view { display: none; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button onclick="changeView('customer')">🛒 Customer Order</button>
        <button onclick="secureAccess('doctor', 'doctor2026')">👨‍⚕️ Doctor Desk</button>
        <button onclick="secureAccess('staff', 'admin2026')">🔑 Staff Dashboard</button>
    </div>

    <!-- VIEW 1: CUSTOMER -->
    <div id="customer" class="view">
        <div class="card">
            <h3>📦 Online Order Desk</h3>
            <div style="background:#fffbeb; padding:10px; border-left:4px solid #f59e0b; margin-bottom:15px; font-size:0.9rem;">
                🚨 Delivery only in 785684. Bills ≥ ₹1599 need Advance Payment.
            </div>
            <form id="orderForm">
                <input type="text" id="cName" placeholder="Name" required>
                <input type="text" id="cPin" placeholder="PIN Code" required>
                <input type="number" id="cBill" placeholder="Amount">
                <button type="submit" style="background:var(--success); color:white; width:100%;">Submit</button>
            </form>
        </div>
    </div>

    <!-- VIEW 2: DOCTOR DESK (Home Page par) -->
    <div id="doctor" class="view">
        <div class="card" style="border-top:4px solid var(--accent);">
            <h3>👨‍⚕️ Doctor Consultation Desk</h3>
            <input type="text" id="dPatient" placeholder="Patient Name">
            <textarea id="dRx" placeholder="Write Prescription..."></textarea>
            <button onclick="logDoctorRx()" style="background:var(--accent); color:white;">Submit Rx</button>
        </div>
    </div>

    <!-- VIEW 3: STAFF DASHBOARD -->
    <div id="staff" class="view">
        <div class="card">
            <h3>🔑 Staff Master Dashboard</h3>
            <div id="logs" style="font-size:0.9rem;">No new activity.</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
